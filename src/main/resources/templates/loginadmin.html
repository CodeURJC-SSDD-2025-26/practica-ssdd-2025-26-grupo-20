<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Celis&amp;Ud - Admin</title>
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/loginuseradmin.css" />
    <link rel="stylesheet" href="/assets/css/templatemo-woox-travel.css" />
  </head>
  <body>
    <header class="header-area header-sticky">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <nav class="main-nav">
              <a href="/" class="logo"
                ><i class="fa fa-utensils"></i> Celis&amp;Ud</a
              >
              <ul class="nav">
                <li><a href="/">Inicio</a></li>
                <li><a href="/restaurants">Restaurantes</a></li>
                <li class="login-item">
                  <a href="/login" class="active">Iniciar Sesión</a>
                </li>
              </ul>
              <a class="menu-trigger"><span>Menu</span></a>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <div class="background">
      <div id="login-especial" class="login-container">
        <h2>Administrador</h2>

        {{#error}}
        <div class="alert alert-danger text-center mb-3">
          Usuario o contraseña incorrectos.
        </div>
        {{/error}}

        <div class="login-card">
          <form action="/process-login" method="post">
            <div class="input-group">
              <span class="icon"><i class="fa-solid fa-user"></i></span>
              <input
                type="text"
                name="username"
                placeholder="Nombre de usuario"
                required
              />
            </div>
            <div class="input-group">
              <span class="icon"><i class="fa-solid fa-lock"></i></span>
              <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
              />
            </div>
            <button type="submit" class="login-btn">INICIAR SESIÓN</button>
          </form>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 Celis&amp;Ud - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
