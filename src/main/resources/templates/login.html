<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Celis&Ud - Login</title>

    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/fontawesome.css" />
    <link rel="stylesheet" href="/assets/css/loginuseradmin.css" />
    <link rel="stylesheet" href="/assets/css/templatemo-woox-travel.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="header-area header-sticky">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <nav class="main-nav">
              <a href="/" class="logo">
                <i class="fa fa-utensils"></i> Celis&Ud
              </a>
              <ul class="nav">
                <li><a href="/">Inicio</a></li>
                <li><a href="/restaurants">Restaurantes</a></li>
                <li class="login-item">
                  <a href="/login" class="active">Iniciar Sesión</a>
                </li>
              </ul>
              <a class="menu-trigger"><span>Menu</span></a>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <div class="background">
      <div class="login-container">
        <h2>Iniciar sesión</h2>
        <div class="login-card selector-card">
          <p class="selector-text">¿Cómo deseas acceder?</p>
          <button
            type="button"
            class="login-btn"
            onclick="window.location.href = '/loginuser'"
          >
            <i class="fa-solid fa-user" style="margin-right: 8px"></i>
            USUARIO
          </button>
          <button
            type="button"
            class="register-btn"
            onclick="window.location.href = '/loginadmin'"
          >
            <i class="fa-solid fa-shield-halved" style="margin-right: 8px"></i>
            ADMINISTRADOR
          </button>
        </div>
      </div>
    </div>

    <footer>
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="copyright-text"><p>Copyright © 2026 Celis&Ud.</p></div>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
