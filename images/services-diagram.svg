<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Services Architecture Diagram</text>

  <!-- Client -->
  <rect x="30" y="80" width="120" height="60" rx="8" fill="#4a90d9" stroke="#2c6fad" stroke-width="2"/>
  <text x="90" y="106" text-anchor="middle" fill="white" font-weight="bold">Client</text>
  <text x="90" y="124" text-anchor="middle" fill="white" font-size="11">(Browser / Postman)</text>

  <!-- app-service box -->
  <rect x="230" y="60" width="200" height="100" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="330" y="90" text-anchor="middle" fill="white" font-weight="bold" font-size="15">app-service</text>
  <text x="330" y="110" text-anchor="middle" fill="white" font-size="11">Spring Boot (HTTPS :8443)</text>
  <text x="330" y="128" text-anchor="middle" fill="white" font-size="11">Web UI + REST API</text>
  <text x="330" y="146" text-anchor="middle" fill="white" font-size="11">JWT Auth</text>

  <!-- utility-service box -->
  <rect x="490" y="60" width="180" height="100" rx="8" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="580" y="90" text-anchor="middle" fill="white" font-weight="bold" font-size="15">utility-service</text>
  <text x="580" y="110" text-anchor="middle" fill="white" font-size="11">Spring Boot (HTTP :8080)</text>
  <text x="580" y="128" text-anchor="middle" fill="white" font-size="11">Email REST API</text>
  <text x="580" y="146" text-anchor="middle" fill="white" font-size="11">/api/email/send</text>

  <!-- MySQL box -->
  <rect x="230" y="250" width="200" height="80" rx="8" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="330" y="285" text-anchor="middle" fill="white" font-weight="bold" font-size="15">MySQL :3306</text>
  <text x="330" y="307" text-anchor="middle" fill="white" font-size="11">Database (practica2)</text>

  <!-- Docker compose boundary -->
  <rect x="210" y="40" width="490" height="320" rx="12" fill="none" stroke="#95a5a6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="57" text-anchor="middle" fill="#7f8c8d" font-size="11">docker-compose network</text>

  <!-- Arrow: Client → app-service (HTTPS) -->
  <line x1="150" y1="110" x2="228" y2="110" stroke="#2c6fad" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="188" y="104" text-anchor="middle" fill="#2c6fad" font-size="10">HTTPS</text>
  <text x="188" y="120" text-anchor="middle" fill="#2c6fad" font-size="10">:8443</text>

  <!-- Arrow: app-service → utility-service (REST HTTP) -->
  <line x1="430" y1="110" x2="488" y2="110" stroke="#ca6f1e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="458" y="104" text-anchor="middle" fill="#ca6f1e" font-size="10">HTTP</text>
  <text x="458" y="120" text-anchor="middle" fill="#ca6f1e" font-size="10">REST</text>

  <!-- Arrow: app-service → MySQL (JDBC) -->
  <line x1="330" y1="160" x2="330" y2="248" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="358" y="210" fill="#6c3483" font-size="10">JDBC</text>

  <!-- Legend -->
  <rect x="30" y="260" width="160" height="100" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="110" y="280" text-anchor="middle" font-weight="bold" fill="#333" font-size="12">Legend</text>
  <line x1="45" y1="300" x2="90" y2="300" stroke="#2c6fad" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="100" y="304" fill="#333" font-size="11">Client traffic</text>
  <line x1="45" y1="320" x2="90" y2="320" stroke="#ca6f1e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="100" y="324" fill="#333" font-size="11">Internal REST</text>
  <line x1="45" y1="340" x2="90" y2="340" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="100" y="344" fill="#333" font-size="11">Database</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c6fad"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ca6f1e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c3483"/>
    </marker>
  </defs>
</svg>
